name: Publish CLI Release

on:
  workflow_dispatch:
    inputs:
      release-branch:
        description: Release branch to publish from (e.g. release/1.2.3 or release/1.2.3-rc.1)
        required: true
        type: string

concurrency:
  group: publish-release-${{ inputs.release-branch }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  validate:
    name: Validate CLI release inputs
    timeout-minutes: 5
    runs-on: ubuntu-22.04
    outputs:
      is_prerelease: ${{ steps.release-inputs.outputs.is_prerelease }}
      release_sha: ${{ steps.release-source.outputs.release_sha }}
      release_tag: v${{ steps.release-inputs.outputs.release_version }}
      release_version: ${{ steps.release-inputs.outputs.release_version }}
    steps:
      - name: Validate CLI release inputs
        id: release-inputs
        shell: bash
        run: |
          set -euo pipefail

          branch='${{ inputs.release-branch }}'

          if [[ "$branch" =~ ^release/(([0-9]+\.[0-9]+\.[0-9]+)(-([0-9A-Za-z._\-]+))?)$ ]]; then
            echo "release_version=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
            if [[ -n "${BASH_REMATCH[4]}" ]]; then
              echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            else
              echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "::error::release_branch must be formatted as release/<version>, for example release/1.2.3 or release/1.2.3-rc.1"
            exit 1
          fi

      - name: Check out release branch
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.release-branch }}

      - name: Resolve CLI release source
        id: release-source
        shell: bash
        run: |
          set -euo pipefail
          echo "release_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build-cli:
    needs: validate
    uses: ./.github/workflows/build-cli.yml
    with:
      ref: ${{ needs.validate.outputs.release_sha }}
      release-version: ${{ needs.validate.outputs.release_version }}

  publish-release:
    name: Publish CLI release
    needs: [validate, build-cli]
    timeout-minutes: 15
    runs-on: ubuntu-22.04
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.validate.outputs.release_sha }}

      - name: Download CLI native artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: agility-*

      - name: Prepare CLI release assets
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          mkdir -p release-assets

          artifact_dirs=(dist/agility-*)

          if [[ ${#artifact_dirs[@]} -eq 0 ]]; then
            echo "::error::No CLI artifacts were downloaded."
            exit 1
          fi

          for artifact_dir in "${artifact_dirs[@]}"; do
            platform=${artifact_dir#dist/agility-}

            if [[ -f "$artifact_dir/agility.exe" ]]; then
              cp "$artifact_dir/agility.exe" "release-assets/agility-${platform}.exe"
            elif [[ -f "$artifact_dir/agility" ]]; then
              cp "$artifact_dir/agility" "release-assets/agility-${platform}"
            else
              echo "::error::No CLI binary found in $artifact_dir"
              exit 1
            fi
          done

          ls -1 release-assets

      - name: Create or validate CLI release tag
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch --tags origin

          tag_name='${{ needs.validate.outputs.release_tag }}'
          release_sha='${{ needs.validate.outputs.release_sha }}'

          if git rev-parse "$tag_name" >/dev/null 2>&1; then
            existing_sha=$(git rev-list -n 1 "$tag_name")
            if [[ "$existing_sha" != "$release_sha" ]]; then
              echo "::error::Tag $tag_name already exists but points to $existing_sha instead of $release_sha"
              exit 1
            fi

            echo "Tag $tag_name already exists and points to the release commit."
          else
            git tag "$tag_name" "$release_sha"
            git push origin "$tag_name"
          fi

      - name: Create or update CLI GitHub Release
        shell: bash
        run: |
          set -euo pipefail

          tag_name='${{ needs.validate.outputs.release_tag }}'
          prerelease_json='false'

          if [[ '${{ needs.validate.outputs.is_prerelease }}' == 'true' ]]; then
            prerelease_json='true'
          fi

          if gh release view "$tag_name" >/dev/null 2>&1; then
            release_id=$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${tag_name}" --jq '.id')
            gh api --method PATCH "repos/${GITHUB_REPOSITORY}/releases/${release_id}" \
              --field name="$tag_name" \
              --field prerelease="$prerelease_json"
            gh release upload "$tag_name" release-assets/* --clobber
          else
            create_args=(
              --verify-tag
              --generate-notes
              --title "$tag_name"
            )

            if [[ "$prerelease_json" == 'true' ]]; then
              create_args+=(--prerelease)
            fi

            gh release create "$tag_name" release-assets/* "${create_args[@]}"
          fi
