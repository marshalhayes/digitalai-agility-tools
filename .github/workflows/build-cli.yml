name: Build CLI

on:
  workflow_call:
    inputs:
      release-version:
        description: Optional release version to stamp into the Maven build.
        required: false
        type: string
        default: ""
      ref:
        description: Git ref to check out. Defaults to the triggering ref.
        required: false
        type: string
        default: ""

jobs:
  build-cli:
    name: Build CLI native image (${{ matrix.name }})
    timeout-minutes: 45
    strategy:
      fail-fast: false

      matrix:
        include:
          - name: linux-x64
            runner: ubuntu-22.04
            artifact: cli/target/agility

          - name: linux-arm64
            runner: ubuntu-22.04-arm
            artifact: cli/target/agility

          - name: linux-x64-musl
            runner: ubuntu-22.04
            build-args: -DbuildArgs=--static,--libc=musl
            artifact: cli/target/agility

          - name: windows-x64
            runner: windows-2025
            artifact: cli/target/agility.exe

          - name: macos-arm64
            runner: macos-15
            artifact: cli/target/agility

          - name: macos-x64
            runner: macos-15-intel
            artifact: cli/target/agility

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Install musl toolchain
        if: matrix.name == 'linux-x64-musl'
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL -o musl-toolchain.tar.gz https://gds.oracle.com/download/bfs/archive/musl-toolchain-1.2.5-oracle-00001-linux-amd64.tar.gz
          tar -xzf musl-toolchain.tar.gz
          echo "$PWD/musl-toolchain/bin" >> "$GITHUB_PATH"

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: graalvm
          cache: maven

      - name: Set CLI release version
        if: ${{ inputs.release-version != '' }}
        shell: bash
        run: |
          set -euo pipefail
          ./mvnw -B versions:set "-DnewVersion=${{ inputs.release-version }}" -DgenerateBackupPoms=false -DprocessAllModules=true

      - name: Build CLI native image
        shell: bash
        run: ./mvnw -B -pl cli -am -Pnative ${{ matrix.build-args || '' }} package

      - name: Upload CLI native artifact
        uses: actions/upload-artifact@v7
        with:
          name: agility-${{ matrix.name }}
          path: ${{ matrix.artifact }}
