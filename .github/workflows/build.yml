name: Build CLI

on:
  push:
    branches:
      - main
      - 'release/**'

  pull_request:
    branches:
      - main
      - 'release/**'
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

jobs:
  build-jar:
    name: Build CLI JAR
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Build CLI JAR
        uses: ./.github/actions/build-cli

      - name: Resolve CLI JAR artifact path
        id: jar
        shell: bash
        run: |
          set -euo pipefail
          final_name=$(./mvnw -q -pl cli help:evaluate -Dexpression=project.build.finalName -DforceStdout)
          echo "path=cli/target/${final_name}.jar" >> "$GITHUB_OUTPUT"

      - name: Upload CLI JAR artifact
        uses: actions/upload-artifact@v7
        with:
          name: cli
          path: ${{ steps.jar.outputs.path }}

  build-native:
    name: Build CLI native image (${{ matrix.name }})
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    needs: build-jar

    strategy:
      fail-fast: false

      matrix:
        include:
          - name: linux-x64
            runner: ubuntu-22.04

          - name: linux-arm64
            runner: ubuntu-22.04-arm

          - name: linux-x64-musl
            runner: ubuntu-22.04
            build-args: -DbuildArgs=--static,--libc=musl

          - name: windows-x64
            runner: windows-2025

          - name: macos-arm64
            runner: macos-15

          - name: macos-x64
            runner: macos-15-intel

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v6

      - name: Install musl toolchain
        if: matrix.name == 'linux-x64-musl'
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL -o musl-toolchain.tar.gz https://gds.oracle.com/download/bfs/archive/musl-toolchain-1.2.5-oracle-00001-linux-amd64.tar.gz
          tar -xzf musl-toolchain.tar.gz
          echo "$PWD/musl-toolchain/bin" >> "$GITHUB_PATH"

      - name: Build CLI native image
        uses: ./.github/actions/build-cli
        with:
          build-target: native
          build-args: ${{ matrix.build-args || '' }}

      - name: Upload CLI native artifact
        uses: actions/upload-artifact@v7
        with:
          name: native-cli-${{ matrix.name }}
          path: ${{ startsWith(matrix.name, 'windows') && 'cli/target/cli.exe' || 'cli/target/cli' }}
