name: Build

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

jobs:
  build-jar:
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "graalvm"
          cache: maven

      - name: Build JAR
        run: ./mvnw -B -pl cli -am package

      - name: Resolve JAR artifact path
        id: jar
        run: |
          final_name=$(./mvnw -q -pl cli help:evaluate -Dexpression=project.build.finalName -DforceStdout)
          echo "path=cli/target/${final_name}.jar" >> "$GITHUB_OUTPUT"

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v7
        with:
          name: cli
          path: ${{ steps.jar.outputs.path }}

  build-native:
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    needs: build-jar

    strategy:
      fail-fast: false

      matrix:
        include:
          - name: linux
            runner: ubuntu-22.04

          - name: linux-arm64
            runner: ubuntu-22.04-arm

          - name: linux-musl
            runner: ubuntu-22.04

          - name: windows
            runner: windows-2025

          - name: macos-arm64
            runner: macos-15

          - name: macos-x64
            runner: macos-15-intel

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "graalvm"
          cache: maven

      - name: Install musl toolchain
        if: matrix.name == 'linux-musl'
        run: |
          set -euo pipefail
          curl -fsSL -o musl-toolchain.tar.gz https://gds.oracle.com/download/bfs/archive/musl-toolchain-1.2.5-oracle-00001-linux-amd64.tar.gz
          tar -xzf musl-toolchain.tar.gz
          echo "$PWD/musl-toolchain/bin" >> "$GITHUB_PATH"

      - name: Build native image
        run: ./mvnw -B -pl cli -am -Pnative ${{ matrix.name == 'linux-musl' && '-DbuildArgs=--static,--libc=musl' || '' }} package

      - name: Upload native artifact
        uses: actions/upload-artifact@v7
        with:
          name: native-cli-${{ matrix.name }}
          path: ${{ matrix.name == 'windows' && 'cli/target/cli.exe' || 'cli/target/cli' }}
